name: Daily AI Prediction Automation

on:
  schedule:
    - cron: '13 13 * * *' # UTC 13:13 -> Türkiye saati 16:13
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install dependencies
        run: pip install requests
      - name: Generate Predictions
        env:
          GEMINI_KEY: ${{ secrets.GEMINI_KEY }}
        run: python generate_predictions.py
      - name: Update Results
        run: python update_results.py
      - name: Commit & Push
        run: |
          git config --local user.email "github-actions[bot]@users.noreply.github.com"
          git config --local user.name "github-actions[bot]"
          git add docs/predictions.json
          git commit -m "Daily AI predictions update" || echo "No changes"
          git push
