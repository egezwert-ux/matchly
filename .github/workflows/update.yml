name: Daily AI Prediction

on:
  schedule:
    - cron: '0 06 * * *'  # UTC 06:00
  workflow_dispatch:

jobs:
  run:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v3
      - name: Setup Python
        uses: actions/setup-python@v4
        with:
          python-version: '3.11'
      - name: Install Dependencies
        run: pip install requests
      - name: Run Match Scraper
        run: python helpers.py
